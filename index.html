<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股周报 · 阳子PMO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=DM+Sans:wght@400;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#E11D48;--secondary:#2563EB;--tertiary:#FACC15;
  --surface:#FFFFFF;--surface-glass:rgba(255,255,255,0.65);
  --text:#1F2937;--text2:#6B7280;--border:#E5E7EB;
  --success:#16A34A;--error:#DC2626;
  --shadow-glass:8px 8px 32px rgba(0,0,0,0.08);
  --shadow-md:4px 4px 16px rgba(0,0,0,0.10);
  --radius-lg:16px;--radius-xl:24px;
}
body{font-family:'DM Sans',sans-serif;background:#FFFFFF;color:var(--text);line-height:1.6;min-height:100vh}

/* Hero band */
.hero-band{background:var(--primary);padding:80px 24px 64px;position:relative;overflow:hidden}
.hero-band::before{content:'';position:absolute;top:-40%;right:-10%;width:500px;height:500px;background:var(--tertiary);border-radius:50%;opacity:0.15}
.hero-band::after{content:'';position:absolute;bottom:-30%;left:-5%;width:300px;height:300px;background:var(--secondary);border-radius:50%;opacity:0.12}
.hero-content{max-width:900px;margin:0 auto;position:relative;z-index:1}
.hero-content h1{font-family:'Poppins',sans-serif;font-size:48px;font-weight:800;color:#FFFFFF;line-height:1.1;margin-bottom:8px}
.hero-content p{font-family:'DM Sans',sans-serif;font-size:16px;color:rgba(255,255,255,0.8)}

/* Container */
.container{max-width:900px;margin:0 auto;padding:48px 24px 80px}

/* Section title */
.section-label{font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;color:var(--secondary);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}

/* Report cards */
.reports{display:flex;flex-direction:column;gap:16px}
.report-card{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;
  background:var(--surface-glass);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:var(--radius-lg);padding:24px;
  text-decoration:none;color:var(--text);
  box-shadow:var(--shadow-glass);
  transition:transform .2s,box-shadow .2s;
}
.report-card:hover{transform:scale(1.02);box-shadow:var(--shadow-md)}
.rc-week{
  font-family:'Fira Code',monospace;font-size:14px;font-weight:400;
  color:var(--primary);background:#FFF1F2;
  padding:6px 12px;border-radius:8px;white-space:nowrap;
}
.rc-body{}
.rc-title{font-family:'Poppins',sans-serif;font-size:18px;font-weight:600;line-height:1.3;margin-bottom:4px}
.rc-date{font-size:13px;color:var(--text2)}
.rc-arrow{font-size:20px;color:var(--text2);transition:transform .2s,color .2s}
.report-card:hover .rc-arrow{transform:translateX(6px);color:var(--primary)}

/* Tags */
.tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;margin-left:8px;vertical-align:middle}
.tag-up{background:#DCFCE7;color:#166534}
.tag-down{background:#FEF2F2;color:#DC2626}

/* Footer */
.footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--border);text-align:center}
.footer p{font-size:13px;color:var(--text2)}
.footer .warn{color:var(--primary);font-size:12px;font-weight:500;margin-top:8px}

@media(max-width:640px){
  .hero-band{padding:56px 20px 40px}
  .hero-content h1{font-size:32px}
  .container{padding:32px 16px 60px}
  .report-card{grid-template-columns:1fr;gap:12px}
  .rc-week{justify-self:start}
}
</style>
</head>
<body>

<div class="hero-band">
<div class="hero-content">
<h1>A股周报</h1>
<p>阳子 · PMO — 异动板块、连板排列、平台突破、高壁垒个股</p>
</div>
</div>

<div class="container">
<div class="section-label">Reports</div>
<div class="reports">

<a class="report-card" href="2026-W22.html">
<span class="rc-week">W22</span>
<div class="rc-body">
<div class="rc-title">科技巨震，电力接棒，风格剧烈切换<span class="tag tag-down">沪指 -1.07%</span></div>
<div class="rc-date">2026年5月26日 — 5月29日</div>
</div>
<span class="rc-arrow">→</span>
</a>

<a class="report-card" href="2026-06-01-半日.html">
<span class="rc-week">6/1</span>
<div class="rc-body">
<div class="rc-title">煤炭地产接棒，科技续跌，风格切换深化<span class="tag tag-down">沪指 -0.12%</span></div>
<div class="rc-date">2026年6月1日 · 半日分析</div>
</div>
<span class="rc-arrow">→</span>
</a>

</div>

<div class="footer">
<p>数据来源：Yahoo Finance / 证券时报 / 财联社 / 东方财富 · 联网核实</p>
<p class="warn">风险提示：本报告基于公开信息整理，不构成投资建议。市场有风险，投资需谨慎。</p>
</div>
</div>

</body>
</html>
